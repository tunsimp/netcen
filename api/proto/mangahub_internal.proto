syntax = "proto3";

package mangahub;

option go_package = "mangahub/internal/grpc";

service MangaService {
  rpc GetManga(GetMangaRequest) returns (MangaResponse);
  rpc SearchManga(SearchRequest) returns (SearchResponse);
  rpc UpdateProgress(ProgressRequest) returns (ProgressResponse);
}

service InternalService {
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc PublishNotification(PublishNotificationRequest) returns (PublishNotificationResponse);
}

message GetMangaRequest {
  string manga_id = 1;
}

message MangaResponse {
  string id = 1;
  string title = 2;
  string author = 3;
  repeated string genres = 4;
  string status = 5;
  int32 total_chapters = 6;
  string description = 7;
}

message SearchRequest {
  string query = 1;
}

message SearchResponse {
  repeated MangaResponse manga = 1;
}

message ProgressRequest {
  string user_id = 1;
  string manga_id = 2;
  int32 chapter = 3;
  string status = 4;
  int64 timestamp = 5;
}

message ProgressResponse {
  string user_id = 1;
  string manga_id = 2;
  int32 chapter = 3;
  string status = 4;
  string updated_at = 5;
}

message HealthCheckRequest {
  string service = 1;
}

message HealthCheckResponse {
  string status = 1;
  int64 timestamp = 2;
}

message PublishNotificationRequest {
  string manga_id = 1;
  string message = 2;
  int64 timestamp = 3;
}

message PublishNotificationResponse {
  string status = 1;
}
